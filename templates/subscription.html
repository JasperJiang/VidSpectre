{% extends "base.html" %}

{% block title %}添加订阅 - VidSpectre{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>添加订阅</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">媒体类型</label>
                        <select name="media_type" class="form-select" required>
                            <option value="movie">电影</option>
                            <option value="tv" selected>电视剧</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">名称</label>
                        <input type="text" name="media_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">资源 ID（可选）</label>
                        <input type="text" name="media_id" class="form-control" placeholder="留空稍后通过搜索设置">
                        <small class="text-muted">或者通过下方的搜索功能选择资源</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">数据源</label>
                        <select name="source_plugin" class="form-select">
                            <option value="btbtla" selected>btbtla</option>
                        </select>
                    </div>

                    <hr>
                    <h5>搜索资源</h5>
                    <p class="text-muted small">搜索并选择正确的资源，它会自动填充上面的"名称"和"资源 ID"</p>
                    <div class="input-group mb-3">
                        <input type="text" id="search-keyword" class="form-control" placeholder="输入剧名搜索...">
                        <button type="button" class="btn btn-outline-secondary" onclick="searchMedia()">搜索</button>
                    </div>
                    <div id="search-results" class="list-group mb-3" style="max-height: 300px; overflow-y: auto;"></div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">添加</button>
                        <a href="{{ url_for('web.index') }}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function searchMedia() {
    const keyword = document.getElementById('search-keyword').value.trim();
    if (!keyword) return;

    const resultsDiv = document.getElementById('search-results');
    resultsDiv.innerHTML = '<div class="list-group-item">搜索中...</div>';

    fetch('/api/search?q=' + encodeURIComponent(keyword))
        .then(response => response.json())
        .then(data => {
            resultsDiv.innerHTML = '';
            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="list-group-item text-muted">未找到结果</div>';
                return;
            }
            data.forEach(item => {
                const badge = item.media_type === 'movie' ? '电影' : '电视剧';
                const div = document.createElement('div');
                div.className = 'list-group-item list-group-item-action';
                div.style.cursor = 'pointer';
                div.innerHTML = '<strong>' + item.name + '</strong> <span class="badge bg-secondary">' + badge + '</span>';
                div.onclick = function() {
                    document.querySelector('input[name="media_name"]').value = item.name;
                    document.querySelector('input[name="media_id"]').value = item.media_id;
                    resultsDiv.innerHTML = '';
                };
                resultsDiv.appendChild(div);
            });
        })
        .catch(err => {
            resultsDiv.innerHTML = '<div class="list-group-item text-danger">搜索失败</div>';
        });
}

document.getElementById('search-keyword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        searchMedia();
    }
});
</script>
{% endblock %}
