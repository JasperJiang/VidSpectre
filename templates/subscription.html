{% extends "base.html" %}

{% block title %}添加订阅 - VidSpectre{% endblock %}

{% block content %}
<!-- Image Preview Modal -->
<div id="img-modal" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center" onclick="closeImgModal()">
    <img id="img-modal-content" src="" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg">
    <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">&times;</button>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div class="px-6 py-4 border-b border-gray-700">
            <h2 class="text-xl font-bold">添加订阅</h2>
        </div>
        <div class="p-6">
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">媒体类型</label>
                    <select name="media_type" id="media-type" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white" onchange="handleMediaTypeChange()">
                        <option value="movie">电影</option>
                        <option value="tv" selected>电视剧</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">爬取插件</label>
                    <select name="source_plugin" id="source-plugin" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white" onchange="handlePluginChange()">
                        <option value="manual" selected>manual（手动管理）</option>
                        <option value="btbtla">btbtla</option>
                    </select>
                </div>

                <div id="search-section">
                    <hr class="border-gray-700">

                    <h3 class="text-lg font-medium text-gray-200">搜索资源</h3>
                    <p class="text-sm text-gray-500 mb-4">搜索并选择正确的资源，它会自动填充下方的"名称"和"资源 ID"</p>

                    <div class="flex gap-2 mb-4">
                        <input type="text" id="search-keyword"
                               class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white"
                               placeholder="输入剧名搜索...">
                        <button type="button" onclick="searchMedia()"
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
                            搜索
                        </button>
                    </div>
                    <div id="search-results" class="bg-gray-700 rounded-lg overflow-hidden mb-4"></div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">名称</label>
                    <input type="text" name="media_name" id="media-name" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white">
                </div>

                <div id="media-id-section">
                    <label class="block text-sm font-medium text-gray-300 mb-1">资源 ID（可选）</label>
                    <input type="text" name="media_id" id="media-id"
                           class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white"
                           placeholder="留空，通过上方搜索功能选择">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">
                        添加
                    </button>
                    <a href="{{ url_for('web.index') }}"
                       class="flex-1 bg-gray-600 hover:bg-gray-500 text-white px-6 py-2 rounded-lg font-medium text-center">
                        取消
                    </a>
                </div>
            </form>

            <script>
                function handlePluginChange() {
                    const plugin = document.getElementById('source-plugin').value;
                    const searchSection = document.getElementById('search-section');
                    const mediaIdSection = document.getElementById('media-id-section');

                    if (plugin === 'manual') {
                        searchSection.style.display = 'none';
                        mediaIdSection.style.display = 'none';
                    } else {
                        searchSection.style.display = 'block';
                        mediaIdSection.style.display = 'block';
                    }
                }

                function handleMediaTypeChange() {
                    // 切换媒体类型时不做自动插件切换，保持用户选择
                    handlePluginChange();
                }

                // Initialize on page load
                document.addEventListener('DOMContentLoaded', function() {
                    handlePluginChange();
                });
            </script>
        </div>
    </div>
</div>
{% endblock %}
